<div class="auth-container">
  <div class="glass-card text-center">
    <div class="brand justify-center">
      <div class="logo-circle"></div>
      <h2>ParkEase</h2>
    </div>
    
    <h1 class="title">Email Verification</h1>

    <div *ngIf="status() === 'verifying'" class="status-container">
      <div class="spinner"></div>
      <p class="subtitle mt-4">Verifying your email address...</p>
    </div>

    <div *ngIf="status() === 'success'" class="status-container">
      <div class="success-icon">✓</div>
      <p class="subtitle mt-4 text-green-400">Your email has been successfully verified!</p>
      <a routerLink="/auth/login" class="btn-primary mt-6 inline-block w-full">Proceed to Login</a>
    </div>

    <div *ngIf="status() === 'error'" class="status-container">
      <div class="error-icon">✕</div>
      <p class="subtitle mt-4 text-red-400">{{ errorMessage() }}</p>
      <a routerLink="/auth/resend-verification" class="btn-primary mt-6 inline-block w-full text-center">Resend Verification Email</a>
    </div>

  </div>
</div>
