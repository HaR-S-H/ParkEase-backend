<div class="auth-container">
  <div class="glass-card register-card">
    <div class="brand">
      <div class="logo-circle"></div>
      <h2>ParkEase</h2>
    </div>
    
    <h1 class="title">Create Account</h1>
    <p class="subtitle">Join ParkEase to start managing your parking seamlessly.</p>

    <div class="alert error" *ngIf="errorMessage()">
      {{ errorMessage() }}
    </div>
    
    <div class="alert success" *ngIf="successMessage()">
      {{ successMessage() }}
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      
      <div class="role-selector">
        <button 
          type="button" 
          [class.active]="role() === 'DRIVER'" 
          (click)="role.set('DRIVER')">
          Driver
        </button>
        <button 
          type="button" 
          [class.active]="role() === 'MANAGER'" 
          (click)="role.set('MANAGER')">
          Manager
        </button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            [ngModel]="fullName()" 
            (ngModelChange)="fullName.set($event)" 
            name="fullName" 
            placeholder="John Doe" 
            required 
            class="input-field"
          />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input 
            type="tel" 
            id="phone" 
            [ngModel]="phone()" 
            (ngModelChange)="phone.set($event)" 
            name="phone" 
            placeholder="+1 234 567 890" 
            required 
            class="input-field"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          [ngModel]="email()" 
          (ngModelChange)="email.set($event)" 
          name="email" 
          placeholder="you@example.com" 
          required 
          class="input-field"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          [ngModel]="password()" 
          (ngModelChange)="password.set($event)" 
          name="password" 
          placeholder="••••••••" 
          required 
          class="input-field"
        />
      </div>

      <div class="form-group" *ngIf="role() === 'DRIVER'">
        <label for="vehiclePlate">Vehicle Plate Number</label>
        <input 
          type="text" 
          id="vehiclePlate" 
          [ngModel]="vehiclePlate()" 
          (ngModelChange)="vehiclePlate.set($event)" 
          name="vehiclePlate" 
          placeholder="ABC-1234" 
          class="input-field"
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <div class="footer-text">
      Already have an account? <a routerLink="/auth/login">Sign In</a>
    </div>
  </div>
</div>
