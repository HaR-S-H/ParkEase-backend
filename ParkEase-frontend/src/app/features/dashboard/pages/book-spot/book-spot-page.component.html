<div class="dashboard-layout driver-layout">
  <header class="driver-header glass-panel">
    <div class="brand">
      <div class="logo-circle"></div>
      <h2>ParkEase</h2>
    </div>
  </header>

  <main class="content-area">
    <div class="form-container glass-panel">
      <div class="form-section">
        <h3>Book Parking Spot</h3>
        <p>You are booking a spot in Lot #{{ lotId }}</p>
        
        <div *ngIf="error()" class="alert error">{{ error() }}</div>

        <form (ngSubmit)="onSubmit()">
          
          <div class="spot-selection-section">
            <label class="section-label">1. Select a Spot</label>
            
            <div *ngIf="spotsLoading()" class="loader-container small">
              <div class="spinner"></div>
            </div>

            <div *ngIf="!spotsLoading() && spots().length === 0" class="empty-spots">
              No spots defined for this lot yet.
            </div>

            <div class="spots-grid" *ngIf="!spotsLoading() && spots().length > 0">
              <div class="spot-box" 
                   *ngFor="let spot of spots()"
                   [class.available]="spot.status === SpotStatus.AVAILABLE"
                   [class.occupied]="spot.status !== SpotStatus.AVAILABLE"
                   [class.selected]="formData.spotId === spot.spotId"
                   (click)="selectSpot(spot)">
                <div class="spot-number">{{ spot.spotNumber }}</div>
                <div class="spot-status-text">
                  {{ spot.status === SpotStatus.AVAILABLE ? 'Available' : 'Occupied' }}
                </div>
              </div>
            </div>
            
            <div class="selected-spot-indicator" *ngIf="formData.spotId">
              Selected Spot ID: <strong>{{ formData.spotId }}</strong>
            </div>
          </div>

          <label class="section-label mt-4">2. Vehicle & Time Details</label>

          <div class="form-row">
            <div class="form-group flex-2">
              <label>Vehicle Plate Number</label>
              <input type="text" class="input-field" [(ngModel)]="formData.vehiclePlate" name="vehiclePlate" placeholder="XYZ-1234" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Vehicle Type</label>
              <select class="input-field" [(ngModel)]="formData.vehicleType" name="vehicleType">
                <option value="TWOW">Two-Wheeler</option>
                <option value="FOURW">Four-Wheeler</option>
                <option value="HEAVY">Heavy Vehicle</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Start Time</label>
              <input type="datetime-local" class="input-field" [(ngModel)]="formData.startTime" name="startTime" required>
            </div>
            
            <div class="form-group">
              <label>End Time</label>
              <input type="datetime-local" class="input-field" [(ngModel)]="formData.endTime" name="endTime" required>
            </div>
          </div>

          <div class="form-actions mt-4">
            <button type="button" class="btn-outline" (click)="cancel()">Cancel</button>
            <button type="submit" class="btn-primary" [disabled]="loading()">
              {{ loading() ? 'Booking...' : 'Confirm Booking' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
