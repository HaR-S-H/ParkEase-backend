<div class="dashboard-layout driver-layout">
  <header class="driver-header glass-panel">
    <div class="brand">
      <div class="logo-circle"></div>
      <h2>ParkEase</h2>
    </div>

    <nav class="nav-links">
      <a routerLink="/dashboard/driver" class="nav-link">Find Parking</a>
      <a routerLink="/dashboard/driver/bookings" class="nav-link">My Bookings</a>
      <a routerLink="/dashboard/driver/vehicles" class="nav-link active">My Vehicles</a>
    </nav>
  </header>

  <main class="content-area">
    <div class="hero-section" style="display: flex; justify-content: space-between; align-items: flex-end; text-align: left;">
      <div>
        <h1 style="text-align: left;">My Vehicles</h1>
        <p style="text-align: left;">Manage the vehicles you use for parking.</p>
      </div>
      <button class="btn-primary" (click)="showAddForm.set(!showAddForm())">
        {{ showAddForm() ? 'Cancel' : '+ Add Vehicle' }}
      </button>
    </div>

    <div *ngIf="showAddForm()" class="form-container glass-panel mb-4">
      <h3>Register New Vehicle</h3>
      <div class="form-row">
        <div class="form-group flex-2">
          <label>License Plate</label>
          <input type="text" class="input-field" [ngModel]="newVehicle().licensePlate" (ngModelChange)="newVehicle.set({ ...newVehicle(), licensePlate: $event })" placeholder="XYZ-1234">
        </div>
        <div class="form-group flex-2">
          <label>Make</label>
          <input type="text" class="input-field" [ngModel]="newVehicle().make" (ngModelChange)="newVehicle.set({ ...newVehicle(), make: $event })" placeholder="Toyota">
        </div>
        <div class="form-group flex-2">
          <label>Model</label>
          <input type="text" class="input-field" [ngModel]="newVehicle().model" (ngModelChange)="newVehicle.set({ ...newVehicle(), model: $event })" placeholder="Camry">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group flex-2">
          <label>Color</label>
          <input type="text" class="input-field" [ngModel]="newVehicle().color" (ngModelChange)="newVehicle.set({ ...newVehicle(), color: $event })" placeholder="Silver">
        </div>
        <div class="form-group flex-2">
          <label>Type</label>
          <select class="input-field" [ngModel]="newVehicle().vehicleType" (ngModelChange)="newVehicle.set({ ...newVehicle(), vehicleType: $event })">
            <option value="TWOW">Two-Wheeler</option>
            <option value="FOURW">Four-Wheeler</option>
            <option value="HEAVY">Heavy Vehicle</option>
          </select>
        </div>
        <div class="form-group flex-2" style="display: flex; align-items: flex-end; padding-bottom: 0.75rem;">
          <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: white;">
            <input type="checkbox" style="width: 18px; height: 18px;" [ngModel]="newVehicle().isEV" (ngModelChange)="newVehicle.set({ ...newVehicle(), isEV: $event })">
            Is Electric Vehicle?
          </label>
        </div>
      </div>

      <div class="form-actions mt-4">
        <button class="btn-primary" (click)="registerVehicle()" [disabled]="adding()">
          {{ adding() ? 'Saving...' : 'Save Vehicle' }}
        </button>
      </div>
    </div>

    <div *ngIf="loading()" class="loader-container">
      <div class="spinner"></div>
    </div>

    <div *ngIf="!loading() && vehicles().length === 0" class="empty-state glass-panel">
      <div class="icon">🚗</div>
      <h3>No Vehicles</h3>
      <p>You haven't registered any vehicles yet.</p>
    </div>

    <div class="vehicles-grid" *ngIf="!loading() && vehicles().length > 0">
      <div class="vehicle-card glass-panel" *ngFor="let v of vehicles()">
        <div class="vehicle-header">
          <div class="plate">{{ v.licensePlate }}</div>
          <div class="ev-badge" *ngIf="v.isEV">⚡ EV</div>
        </div>
        <div class="vehicle-details">
          <div><strong>Make:</strong> {{ v.make }}</div>
          <div><strong>Model:</strong> {{ v.model }}</div>
          <div><strong>Color:</strong> {{ v.color }}</div>
          <div><strong>Type:</strong> {{ v.vehicleType }}</div>
        </div>
        <button class="btn-outline danger mt-4" style="width: 100%; justify-content: center;" (click)="deleteVehicle(v.vehicleId)">
          Remove
        </button>
      </div>
    </div>
  </main>
</div>
